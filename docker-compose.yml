# docker-compose.yml
services:
  app:
    build: .
    ports:
      - "80:80"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password  # pragma: allowlist secret
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password  # pragma: allowlist secret
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]  # pragma: allowlist secret
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
