# .pre-commit-config.yaml
# Customized for Python (FastAPI + Neo4j) + React (Vite + vitest) stack
# Project: Manning NYC Real Estate Knowledge Graph

repos:
  # ---- Secret Detection ----
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: .*\.lock|.*\.log|package-lock\.json|uv\.lock

  # ---- Local Security Hooks ----
  - repo: local
    hooks:
      - id: block-large-files
        name: Block Large Binary Files
        entry: sh -c 'git diff --cached --name-only | grep -qE "\.(h5|pkl|pth|onnx|dump|parquet|sqlite3)$" && echo "ERROR - Large binary files detected. Remove with git rm --cached" && exit 1 || exit 0'
        language: system
        pass_filenames: false

      - id: check-env-files
        name: Block .env Files
        entry: sh -c 'git diff --cached --name-only | grep -qE "^\.env(\..+)?$" && echo "ERROR - .env file detected. Never commit secrets!" && exit 1 || exit 0'
        language: system
        pass_filenames: false

      - id: verify-selective-staging
        name: Verify Selective Staging
        entry: sh -c 'echo "Staged files:" && git diff --cached --name-only'
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # ---- Standard File Hygiene ----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: mixed-line-ending
        args: ['--fix=lf']
        name: Fix Line Endings to LF
      - id: end-of-file-fixer
        name: Fix End of Files
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
      - id: check-json
        name: Validate JSON Files
      - id: check-yaml
        name: Validate YAML Files
      - id: check-added-large-files
        args: ['--maxkb=500']
        name: Check for Large Files

  # ---- Pre-commit: Quick Tests ----
  - repo: local
    hooks:
      - id: pytest-quick
        name: Pytest Quick Tests (Backend)
        entry: bash -c 'cd /home/lenovo/code/ltphongssvn/manning-NewYorkCityRealEstateKnowledgeGraph && uv run pytest --tb=short -q --ignore=backend/test_neo4j_integration.py 2>&1 || true'
        language: system
        pass_filenames: false

      - id: vitest-quick
        name: Vitest Quick Tests (Frontend)
        entry: bash -c 'cd /home/lenovo/code/ltphongssvn/manning-NewYorkCityRealEstateKnowledgeGraph/frontend && npx vitest run --passWithNoTests --bail 2>&1 || true'
        language: system
        pass_filenames: false

  # ---- Pre-push: Coverage Enforcement ----
  - repo: local
    hooks:
      - id: pytest-coverage-push
        name: Pytest Coverage 80% Per-File (Backend)
        entry: bash -c 'cd /home/lenovo/code/ltphongssvn/manning-NewYorkCityRealEstateKnowledgeGraph && echo "========================================" && echo "  BACKEND COVERAGE - 80% Per-File Min" && echo "========================================" && uv run pytest --tb=short -q --ignore=backend/test_neo4j_integration.py 2>&1 && echo "PASSED - Backend tests green" || (echo "FAILED - Backend tests" && exit 1)'
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: vitest-coverage-push
        name: Vitest Coverage 80% Per-File (Frontend)
        entry: bash -c 'cd /home/lenovo/code/ltphongssvn/manning-NewYorkCityRealEstateKnowledgeGraph/frontend && echo "========================================" && echo "  FRONTEND COVERAGE - 80% Per-File Min" && echo "========================================" && npx vitest run --passWithNoTests 2>&1 && echo "PASSED - Frontend tests green" || (echo "FAILED - Frontend tests" && exit 1)'
        language: system
        pass_filenames: false
        stages: [pre-push]
